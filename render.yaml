services:
  - type: web
    name: working-days-backend
    env: python
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_ALLOWED_HOSTS
        value: "127.0.0.1,localhost,working-days-backend.onrender.com"
      - key: DJANGO_SECRET_KEY
        generate: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://working-days-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://working-days-frontend.onrender.com"

  - type: static
    name: working-days-frontend
    env: static
    branch: main
    root: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://working-days-backend.onrender.com/api"
